name: Backend tests

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: propizy
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d propizy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DEBUG: 'True'
      SECRET_KEY: ci-test-secret-key
      DB_NAME: propizy
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: '5432'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Run tests
        working-directory: backend
        run: |
          python manage.py test \
            users.tests \
            users.security_tests \
            users.test_emails \
            users.test_mpesa_integration \
            properties.tests \
            properties.tests_property_units \
            properties.tests_transfer \
            payments.tests \
            payments.test_mpesa_org \
            payments.test_wallet \
            maintenance.tests \
            --verbosity=1
